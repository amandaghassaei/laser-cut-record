<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Vinyl record — cartoon illustration style -->
  <!-- Dark outline -->
  <circle cx="64" cy="64" r="60" fill="#3d3535" stroke="#2a2222" stroke-width="3"/>
  <!-- Groove lines — arcs centered on (64,64), varying radii -->
  <path d="M 14 64 A 50 50 0 0 1 64 14" fill="none" stroke="#2e2626" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 114 64 A 50 50 0 0 1 64 114" fill="none" stroke="#2e2626" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 64 20 A 44 44 0 0 1 108 64" fill="none" stroke="#2e2626" stroke-width="2" stroke-linecap="round"/>
  <path d="M 64 108 A 44 44 0 0 1 20 64" fill="none" stroke="#2e2626" stroke-width="2" stroke-linecap="round"/>
  <path d="M 26 64 A 38 38 0 0 1 64 26" fill="none" stroke="#2e2626" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 102 64 A 38 38 0 0 1 64 102" fill="none" stroke="#2e2626" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 64 32 A 32 32 0 0 1 96 64" fill="none" stroke="#2e2626" stroke-width="2" stroke-linecap="round"/>
  <path d="M 64 96 A 32 32 0 0 1 32 64" fill="none" stroke="#2e2626" stroke-width="2" stroke-linecap="round"/>
  <!-- Label area — large muted red -->
  <circle cx="64" cy="64" r="22" fill="#c45c4f" stroke="#2a2222" stroke-width="2"/>
  <!-- Spindle hole -->
  <circle cx="64" cy="64" r="4" fill="#2a2222"/>
</svg>
